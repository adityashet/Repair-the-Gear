<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Repair The Gear</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/theme.js" defer></script>
    <style>
        .splash-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--background);
        }
        .splash-logo {
            font-size: 36px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: var(--spacing-xl);
            text-align: center;
        }
        .loader {
            border: 4px solid var(--surface);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="mobile-wrapper">
    <div class="splash-container fade-in">
        <img src="img/logo.png" alt="Repair The Gear Logo" style="height: 150px; margin-bottom: 20px;" onerror="this.src='https://via.placeholder.com/150?text=Logo'">
        <div class="splash-logo">Repair The Gear</div>
        <div class="loader"></div>
    </div>

    <script>
        // Redirect to login after 2 seconds
        setTimeout(() => {
            const user = localStorage.getItem('user');
            if (user) {
                window.location.href = 'home.html';
            } else {
                window.location.href = 'login.html';
            }
        }, 2000);
    </script>
    </div>
</body>
</html>
