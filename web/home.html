<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Home - Repair The Gear</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Leaflet CSS for real maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Ionicons for icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        .map-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #0B1120; /* Dark theme map placeholder */
            z-index: 1;
        }
        .map-placeholder {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.5;
        }
        .address-card {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            background: var(--surface);
            padding: var(--spacing-m);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            z-index: 10;
        }
        .address-header {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
            color: var(--primary);
            font-weight: 600;
            font-size: 14px;
        }
        .address-header ion-icon { margin-right: 8px; font-size: 18px; }
        .address-text {
            font-weight: 500;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .bottom-sheet {
            position: absolute;
            bottom: 70px; /* Above nav bar */
            left: 0;
            right: 0;
            background: var(--surface);
            border-top-left-radius: var(--border-radius-xl);
            border-top-right-radius: var(--border-radius-xl);
            padding: var(--spacing-l);
            box-shadow: 0 -4px 16px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .action-row {
            display: flex;
            justify-content: space-between;
            margin-top: var(--spacing-m);
        }
        .action-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text);
            padding: var(--spacing-s);
        }
        .icon-circle {
            width: 64px;
            height: 64px;
            border-radius: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: var(--spacing-s);
            font-size: 32px;
        }
        .icon-mechanic { background: rgba(56, 189, 248, 0.2); color: var(--secondary); }
        .icon-tow { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .action-text { font-weight: 600; font-size: 15px; }
    </style>
</head>
<body>
    <div class="mobile-wrapper">
    <!-- Real Map Container -->
    <div id="map" class="map-container"></div>

    <!-- Top Address Card -->
    <div class="address-card" style="padding: 12px;">
        <div class="address-header" style="margin-bottom: 8px;">
            <ion-icon name="location"></ion-icon>
            Current Location
        </div>
        <div style="display: flex; align-items: center; background: rgba(255,255,255,0.05); border-radius: 8px; padding: 8px;">
            <input type="text" id="locationInput" placeholder="Locating..." style="flex: 1; border: none; background: transparent; color: var(--text); font-size: 14px; outline: none; width: 100%;">
            <ion-icon name="search" onclick="searchLocation()" style="color: var(--primary); font-size: 20px; cursor: pointer; padding-left: 8px;"></ion-icon>
        </div>
    </div>

    <!-- Bottom Actions -->
    <div class="bottom-sheet slide-up">
        <h2>Need Assistance?</h2>
        <div class="action-row">
            <a href="search.html?type=mechanic" class="action-btn">
                <div class="icon-circle icon-mechanic">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                </div>
                <span class="action-text">Find Mechanic</span>
            </a>
            <a href="search.html?type=tow" class="action-btn">
                <div class="icon-circle icon-tow">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="10" width="10" height="10" rx="2" />
                        <path d="M12 14h4l3-4h3v10h-3" />
                        <circle cx="6" cy="20" r="2" />
                        <circle cx="16" cy="20" r="2" />
                        <path d="M12 10V6l4-2" />
                    </svg>
                </div>
                <span class="action-text">Tow Vehicle</span>
            </a>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="home.html" class="nav-item active">
            <ion-icon name="home"></ion-icon>
            Home
        </a>
        <a href="history.html" class="nav-item">
            <ion-icon name="time-outline"></ion-icon>
            History
        </a>
        <a href="profile.html" class="nav-item">
            <ion-icon name="person-outline"></ion-icon>
            Profile
        </a>
    </nav>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize Map
        const map = L.map('map', { zoomControl: false }).setView([20.5937, 78.9629], 5); // Default to India center
        
        // Add OpenStreetMap tiles (Free, no API key needed)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);

        let userMarker = null;

        // Geolocation & Reverse Geocoding
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                // Center map on user
                map.setView([lat, lon], 15);

                // Add marker
                userMarker = L.marker([lat, lon]).addTo(map)
                    .bindPopup("You are here").openPopup();

                // Reverse Geocode using LocationIQ (Replace Your_API_Access_Token)
                // Note: For this to work in production, you must add your real token here.
                // If it fails (e.g. invalid token), we fallback to coordinates.
                const LOCATION_IQ_TOKEN = 'pk.7c354e7f3a446aa4850a775752fb4c4e'; 
                
                try {
                    // Try LocationIQ first
                    const response = await fetch(`https://us1.locationiq.com/v1/reverse?key=${LOCATION_IQ_TOKEN}&lat=${lat}&lon=${lon}&format=json`);
                    if(response.ok) {
                        const data = await response.json();
                        document.getElementById('locationInput').value = data.display_name.split(',').slice(0,3).join(', ');
                    } else {
                        throw new Error("LocationIQ failed (likely invalid token)");
                    }
                } catch (error) {
                    console.log(error.message, "Falling back to free Nominatim API...");
                    // Free fallback if token is invalid
                    try {
                        const fb = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                        const fbData = await fb.json();
                        document.getElementById('locationInput').value = fbData.display_name.split(',').slice(0,3).join(', ');
                    } catch(e) {
                        document.getElementById('locationInput').value = `Lat: ${lat.toFixed(4)}, Lon: ${lon.toFixed(4)}`;
                    }
                }
            }, (error) => {
                document.getElementById('locationInput').value = 'Location Access Denied';
            });
        } else {
            document.getElementById('locationInput').value = 'Geolocation not supported';
        }

        async function searchLocation() {
            const query = document.getElementById('locationInput').value;
            if(!query) return;
            
            const LOCATION_IQ_TOKEN = 'pk.7c354e7f3a446aa4850a775752fb4c4e'; 
            try {
                const response = await fetch(`https://us1.locationiq.com/v1/search?key=${LOCATION_IQ_TOKEN}&q=${encodeURIComponent(query)}&format=json`);
                if(response.ok) {
                    const data = await response.json();
                    if(data && data.length > 0) {
                        const lat = parseFloat(data[0].lat);
                        const lon = parseFloat(data[0].lon);
                        
                        map.setView([lat, lon], 15);
                        if(userMarker) {
                            userMarker.setLatLng([lat, lon]);
                        } else {
                            userMarker = L.marker([lat, lon]).addTo(map);
                        }
                        userMarker.bindPopup("You are here").openPopup();
                        document.getElementById('locationInput').value = data[0].display_name.split(',').slice(0,3).join(', ');
                    }
                }
            } catch(e) {
                console.error("Search failed", e);
            }
        }
    </script>
    </div>
</body>
</html>
