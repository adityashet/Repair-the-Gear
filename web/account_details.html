<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Account Details - Repair The Gear</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        .header-bar {
            display: flex; align-items: center; padding: var(--spacing-m);
            font-size: 18px; font-weight: 600; border-bottom: 1px solid var(--border);
            color: var(--text);
        }
        .back-btn {
            font-size: 24px; color: var(--text); margin-right: var(--spacing-m); cursor: pointer; text-decoration: none;
        }
        .detail-item {
            padding: var(--spacing-m);
            border-bottom: 1px solid var(--border);
        }
        .detail-label {
            font-size: 12px; color: var(--text-secondary); margin-bottom: 4px;
        }
        .detail-value {
            font-size: 16px; font-weight: 500; color: var(--text);
        }
        .logout-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--error);
            color: var(--error);
            padding: 14px;
            border-radius: var(--border-radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="mobile-wrapper">
        <div class="fade-in" style="flex: 1; display: flex; flex-direction: column; overflow-y: auto;">
            <div class="header-bar">
                <a href="profile.html" class="back-btn"><ion-icon name="arrow-back-outline"></ion-icon></a>
                Account Details
            </div>
            
            <div class="detail-item">
                <div class="detail-label">Name</div>
                <div class="detail-value" id="detailName">Alex User</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">Phone Number</div>
                <div class="detail-value" id="detailPhone">+91 9876543210</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">Email</div>
                <div class="detail-value">user@example.com</div>
            </div>
            
            <div style="padding: var(--spacing-m) var(--spacing-l); margin-top: auto; margin-bottom: var(--spacing-l);">
                <button class="logout-btn" onclick="logout()">Log Out</button>
            </div>
        </div>
    </div>
    <script>
        const userStr = localStorage.getItem('user');
        if (userStr) {
            const user = JSON.parse(userStr);
            document.getElementById('detailName').textContent = user.name || 'User';
            document.getElementById('detailPhone').textContent = user.phone;
        }
        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
